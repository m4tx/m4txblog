{% extends "_base.html" %}

{% block title %}{{ page.title }}{% endblock %}

{% block content -%}
<div class="container">
    <div class="row">
        <div class="col blogpost mt-3 px-lg-3 px-xl-5" data-bs-spy="scroll" data-bs-target="#page-toc" data-bs-offset="0" tabindex="0">
            <h1>{{ page.title }}</h1>

            <div class="alert alert-danger" role="alert">This page is very old and might not represent the current facts, or views of the author.</div>

            {{- page.content_html|safe -}}
        </div>
    </div>
</div>
{%- endblock %}
